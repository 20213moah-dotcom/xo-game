<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>X O — The Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

  :root{
    --bg:#0d0d0d;
    --surface:#161616;
    --surface2:#1f1f1f;
    --border:#2a2a2a;
    --x:#e8c547;
    --o:#5b9cf6;
    --text:#f0ece0;
    --muted:#888;
    --radius:12px;
  }

  html,body{
    height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:'DM Sans',sans-serif;
    font-size:16px;
    line-height:1.5;
    overflow-x:hidden;
  }

  /* ── layout ── */
  .screen{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:1.5rem 1rem;
  }
  .screen.hidden{display:none}

  /* ── grid background ── */
  body::before{
    content:'';
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(var(--border) 1px,transparent 1px),
      linear-gradient(90deg,var(--border) 1px,transparent 1px);
    background-size:40px 40px;
    opacity:0.35;
    pointer-events:none;
    z-index:0;
  }
  .screen,.game-wrap{position:relative;z-index:1}

  /* ── logo ── */
  .logo{
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(72px,20vw,120px);
    letter-spacing:0.04em;
    line-height:1;
    margin-bottom:0.25rem;
  }
  .logo span.lx{color:var(--x)}
  .logo span.lo{color:var(--o)}
  .tagline{
    font-size:13px;
    color:var(--muted);
    letter-spacing:0.12em;
    text-transform:uppercase;
    margin-bottom:2.5rem;
  }

  /* ── cards ── */
  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:1.5rem;
    width:100%;
    max-width:420px;
  }

  /* ── mode picker ── */
  .mode-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:1.5rem;
  }
  .mode-btn{
    background:var(--surface2);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:1rem 0.75rem;
    cursor:pointer;
    color:var(--text);
    font-family:'DM Sans',sans-serif;
    font-size:13px;
    text-align:center;
    transition:border-color 0.15s, background 0.15s;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
  }
  .mode-btn .icon{font-size:28px;line-height:1}
  .mode-btn .label{font-weight:500;font-size:13px}
  .mode-btn .sub{font-size:11px;color:var(--muted)}
  .mode-btn.sel-x{border-color:var(--x);background:rgba(232,197,71,0.07)}
  .mode-btn.sel-o{border-color:var(--o);background:rgba(91,156,246,0.07)}
  .mode-btn:hover{border-color:var(--muted)}

  /* ── inputs ── */
  .field{margin-bottom:1rem}
  .field label{
    display:block;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color:var(--muted);
    margin-bottom:6px;
  }
  .field input{
    width:100%;
    background:var(--surface2);
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px 12px;
    color:var(--text);
    font-family:'DM Sans',sans-serif;
    font-size:15px;
    outline:none;
    transition:border-color 0.15s;
  }
  .field input:focus{border-color:var(--muted)}

  /* ── difficulty row ── */
  .diff-row{
    display:flex;
    gap:8px;
    margin-bottom:1.25rem;
  }
  .diff-btn{
    flex:1;
    background:var(--surface2);
    border:1px solid var(--border);
    border-radius:8px;
    padding:7px 4px;
    color:var(--muted);
    font-family:'DM Sans',sans-serif;
    font-size:12px;
    cursor:pointer;
    transition:all 0.15s;
  }
  .diff-btn.active{
    background:var(--surface2);
    border-color:var(--o);
    color:var(--text);
  }

  /* ── big CTA ── */
  .cta{
    width:100%;
    background:var(--x);
    border:none;
    border-radius:var(--radius);
    padding:14px;
    font-family:'Bebas Neue',sans-serif;
    font-size:22px;
    letter-spacing:0.1em;
    color:#0d0d0d;
    cursor:pointer;
    transition:opacity 0.15s, transform 0.1s;
  }
  .cta:hover{opacity:0.9}
  .cta:active{transform:scale(0.98)}
  .cta.blue{background:var(--o)}

  /* ════════════════════════════════
     GAME SCREEN
  ════════════════════════════════ */
  .game-wrap{
    width:100%;
    max-width:440px;
    margin:0 auto;
    padding:1rem;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:1rem;
  }

  /* header */
  .gh{
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .gh-logo{
    font-family:'Bebas Neue',sans-serif;
    font-size:28px;
    letter-spacing:0.05em;
  }
  .gh-logo .lx{color:var(--x)}
  .gh-logo .lo{color:var(--o)}
  .back-btn{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:8px;
    padding:6px 14px;
    color:var(--muted);
    font-family:'DM Sans',sans-serif;
    font-size:13px;
    cursor:pointer;
    transition:color 0.15s;
  }
  .back-btn:hover{color:var(--text)}

  /* score bar */
  .score-bar{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    gap:8px;
    align-items:center;
  }
  .sc{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:10px 8px;
    text-align:center;
  }
  .sc-name{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    margin-bottom:2px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .sc-name.xc{color:var(--x)}
  .sc-name.oc{color:var(--o)}
  .sc-val{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:1}
  .sc-mid{
    text-align:center;
  }
  .sc-mid-d{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em}
  .sc-mid-v{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--muted)}

  /* status */
  .status-bar{
    text-align:center;
    min-height:32px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
  }
  .status-dot{
    width:10px;height:10px;
    border-radius:50%;
    background:var(--x);
    flex-shrink:0;
  }
  .status-dot.o{background:var(--o)}
  .status-txt{font-size:15px;font-weight:500}

  /* board */
  .board{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
  }
  .cell{
    aspect-ratio:1;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(36px,12vw,60px);
    cursor:pointer;
    transition:background 0.1s, border-color 0.1s, transform 0.08s;
    user-select:none;
  }
  .cell:hover:not(.taken){
    background:var(--surface2);
    border-color:var(--muted);
  }
  .cell:active:not(.taken){transform:scale(0.95)}
  .cell.taken{cursor:default}
  .cell.x{color:var(--x)}
  .cell.o{color:var(--o)}
  .cell.win-x{background:rgba(232,197,71,0.12);border-color:var(--x)}
  .cell.win-o{background:rgba(91,156,246,0.12);border-color:var(--o)}

  /* bottom buttons */
  .btn-row{display:flex;gap:8px}
  .btn-row button{
    flex:1;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:11px;
    color:var(--muted);
    font-family:'DM Sans',sans-serif;
    font-size:13px;
    cursor:pointer;
    transition:color 0.15s, border-color 0.15s;
  }
  .btn-row button:hover{color:var(--text);border-color:var(--muted)}
  .btn-row button:active{transform:scale(0.98)}

  /* mode badge */
  .mode-badge{
    text-align:center;
    font-size:11px;
    color:var(--muted);
    letter-spacing:0.1em;
    text-transform:uppercase;
  }

  /* thinking indicator */
  .thinking{
    display:inline-block;
    animation:blink 0.7s step-end infinite;
  }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

  /* ── responsive ── */
  @media(max-width:360px){
    .mode-grid{grid-template-columns:1fr}
    .logo{font-size:64px}
  }
</style>
</head>
<body>

<!-- ══════════════════════════════
     LOBBY SCREEN
══════════════════════════════ -->
<div class="screen" id="lobby">
  <div class="logo">
    <span class="lx">X</span><span class="lo">O</span>
  </div>
  <p class="tagline">choose your battle</p>

  <div class="card">
    <div class="mode-grid" id="mode-grid">
      <button class="mode-btn" data-mode="local" onclick="pickMode(this)">
        <span class="icon">🧑‍🤝‍🧑</span>
        <span class="label">1 vs 1</span>
        <span class="sub">Same device</span>
      </button>
      <button class="mode-btn" data-mode="ai" onclick="pickMode(this)">
        <span class="icon">🤖</span>
        <span class="label">vs Computer</span>
        <span class="sub">Play the bot</span>
      </button>
    </div>

    <!-- Local: name fields -->
    <div id="local-fields">
      <div class="field">
        <label>Player X name</label>
        <input type="text" id="name-x" placeholder="Player X" maxlength="14">
      </div>
      <div class="field">
        <label>Player O name</label>
        <input type="text" id="name-o" placeholder="Player O" maxlength="14">
      </div>
    </div>

    <!-- AI: name + difficulty -->
    <div id="ai-fields" style="display:none">
      <div class="field">
        <label>Your name</label>
        <input type="text" id="name-human" placeholder="Player" maxlength="14">
      </div>
      <div class="field">
        <label>Difficulty</label>
        <div class="diff-row">
          <button class="diff-btn active" data-d="easy" onclick="pickDiff(this)">Easy</button>
          <button class="diff-btn" data-d="medium" onclick="pickDiff(this)">Medium</button>
          <button class="diff-btn" data-d="hard" onclick="pickDiff(this)">Hard</button>
        </div>
      </div>
      <div class="field">
        <label>You play as</label>
        <div class="diff-row">
          <button class="diff-btn active" data-side="X" onclick="pickSide(this)">X (first)</button>
          <button class="diff-btn" data-side="O" onclick="pickSide(this)">O (second)</button>
        </div>
      </div>
    </div>

    <button class="cta" id="start-btn" onclick="startGame()">Let's Play</button>
  </div>
</div>

<!-- ══════════════════════════════
     GAME SCREEN
══════════════════════════════ -->
<div class="screen hidden" id="game-screen">
  <div class="game-wrap">
    <div class="gh">
      <div class="gh-logo"><span class="lx">X</span><span class="lo">O</span></div>
      <button class="back-btn" onclick="goLobby()">&#8592; Menu</button>
    </div>

    <div class="mode-badge" id="mode-badge">Local · 1 vs 1</div>

    <div class="score-bar">
      <div class="sc">
        <div class="sc-name xc" id="sc-namex">Player X</div>
        <div class="sc-val" id="sc-valx">0</div>
      </div>
      <div class="sc-mid">
        <div class="sc-mid-d">Draws</div>
        <div class="sc-mid-v" id="sc-vald">0</div>
      </div>
      <div class="sc">
        <div class="sc-name oc" id="sc-nameo">Player O</div>
        <div class="sc-val" id="sc-valo">0</div>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <div class="status-txt" id="status-txt">X's turn</div>
    </div>

    <div class="board" id="board"></div>

    <div class="btn-row">
      <button onclick="newRound()">New round</button>
      <button onclick="resetAll()">Reset scores</button>
    </div>
  </div>
</div>

<script>
/* ── State ── */
var mode='local', diff='easy', humanSide='X';
var nameX='Player X', nameO='Player O';
var board=Array(9).fill('');
var cur='X', over=false;
var scores={X:0,O:0,D:0};
var WINS=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

/* ── Lobby ── */
function pickMode(btn){
  mode=btn.dataset.mode;
  document.querySelectorAll('.mode-btn').forEach(function(b){
    b.className='mode-btn';
  });
  btn.classList.add(mode==='local'?'sel-x':'sel-o');
  document.getElementById('local-fields').style.display=mode==='local'?'':'none';
  document.getElementById('ai-fields').style.display=mode==='ai'?'':'none';
  document.getElementById('start-btn').className='cta'+(mode==='ai'?' blue':'');
}
function pickDiff(btn){
  document.querySelectorAll('[data-d]').forEach(function(b){b.className='diff-btn';});
  btn.className='diff-btn active';
  diff=btn.dataset.d;
}
function pickSide(btn){
  document.querySelectorAll('[data-side]').forEach(function(b){b.className='diff-btn';});
  btn.className='diff-btn active';
  humanSide=btn.dataset.side;
}

/* ── Start ── */
function startGame(){
  if(mode==='local'){
    nameX=(document.getElementById('name-x').value.trim()||'Player X');
    nameO=(document.getElementById('name-o').value.trim()||'Player O');
  } else {
    var h=(document.getElementById('name-human').value.trim()||'Player');
    nameX=humanSide==='X'?h:'Computer';
    nameO=humanSide==='O'?h:'Computer';
  }
  scores={X:0,O:0,D:0};
  document.getElementById('lobby').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');
  document.getElementById('sc-namex').textContent=nameX;
  document.getElementById('sc-nameo').textContent=nameO;
  var badge=mode==='local'?'Local · 1 vs 1':'vs Computer · '+diff.charAt(0).toUpperCase()+diff.slice(1);
  document.getElementById('mode-badge').textContent=badge;
  newRound();
}
function goLobby(){
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('lobby').classList.remove('hidden');
}

/* ── Game logic ── */
function newRound(){
  board=Array(9).fill('');over=false;cur='X';
  render();setStatus();
  if(mode==='ai'&&humanSide==='O'){setTimeout(aiMove,450);}
}
function resetAll(){scores={X:0,O:0,D:0};updateScores();newRound();}

function checkWin(b,p){
  for(var i=0;i<WINS.length;i++){
    var w=WINS[i];
    if(b[w[0]]===p&&b[w[1]]===p&&b[w[2]]===p)return w;
  }return null;
}
function isDraw(b){return b.every(function(c){return c!=='';});}

function handleClick(i){
  if(over||board[i]!=='')return;
  if(mode==='ai'&&cur!==humanSide)return;
  play(i,cur);
}
function play(i,p){
  board[i]=p;
  var w=checkWin(board,p);
  if(w){
    over=true;scores[p]++;updateScores();
    render(w,p);
    var winner=p==='X'?nameX:nameO;
    setStatus(winner+' wins!',p,true);
    return;
  }
  if(isDraw(board)){
    over=true;scores.D++;updateScores();
    render();
    setStatus("It's a draw!",'',false,true);
    return;
  }
  cur=cur==='X'?'O':'X';
  render();setStatus();
  if(mode==='ai'&&cur!==humanSide&&!over){setTimeout(aiMove,420);}
}

function setStatus(msg,p,won,draw){
  var dot=document.getElementById('status-dot');
  var txt=document.getElementById('status-txt');
  if(won){
    dot.className='status-dot'+(p==='O'?' o':'');
    txt.textContent=msg;
  } else if(draw){
    dot.className='status-dot';
    dot.style.background='#888';
    txt.textContent=msg;
  } else {
    dot.style.background='';
    dot.className='status-dot'+(cur==='O'?' o':'');
    var name=cur==='X'?nameX:nameO;
    var isAI=(mode==='ai'&&cur!==humanSide);
    txt.innerHTML=isAI?'<span class="thinking">Thinking...</span>':(name+"'s turn");
  }
}
function updateScores(){
  document.getElementById('sc-valx').textContent=scores.X;
  document.getElementById('sc-valo').textContent=scores.O;
  document.getElementById('sc-vald').textContent=scores.D;
}

function render(highlight,wp){
  var bd=document.getElementById('board');
  bd.innerHTML='';
  for(var i=0;i<9;i++){
    var c=document.createElement('button');
    var cls='cell';
    if(board[i])cls+=' taken '+board[i];
    if(highlight&&highlight.indexOf(i)>=0)cls+=' win-'+wp;
    c.className=cls;
    c.textContent=board[i];
    c.setAttribute('data-i',i);
    (function(idx){c.onclick=function(){handleClick(idx);};})(i);
    bd.appendChild(c);
  }
}

/* ── AI ── */
function aiMove(){
  if(over)return;
  var mv=-1;
  if(diff==='easy')mv=randMove();
  else if(diff==='medium')mv=Math.random()<0.65?bestMove():randMove();
  else mv=bestMove();
  if(mv>=0)play(mv,cur);
}
function randMove(){
  var e=[];for(var i=0;i<9;i++){if(board[i]==='')e.push(i);}
  return e.length?e[Math.floor(Math.random()*e.length)]:-1;
}
function bestMove(){
  var b=board.slice();
  for(var i=0;i<9;i++){if(!b[i]){b[i]=cur;if(checkWin(b,cur))return i;b[i]='';}}
  var opp=cur==='X'?'O':'X';
  for(var i=0;i<9;i++){if(!b[i]){b[i]=opp;if(checkWin(b,opp))return i;b[i]='';}}
  if(!b[4])return 4;
  var corners=[0,2,6,8].filter(function(x){return !b[x];});
  if(corners.length)return corners[Math.floor(Math.random()*corners.length)];
  var sides=[1,3,5,7].filter(function(x){return !b[x];});
  if(sides.length)return sides[Math.floor(Math.random()*sides.length)];
  return randMove();
}

/* ── init ── */
pickMode(document.querySelector('[data-mode="local"]'));
</script>
</body>
</html>
